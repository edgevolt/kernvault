services:
  kernvault:
    image: ghcr.io/edgevolt/kernvault:latest
    container_name: kernvault
    restart: unless-stopped
    ports:
      - "127.0.0.1:9876:9876"
    volumes:
      - kernvault_data:/app/data
    environment:
      - PORT=9876
      # ── Read-aloud (local text-to-speech) ────────────────────────────────
      # Fully local & private: a small neural model (baked into the image) runs
      # in-process on the host CPU; no text or audio is ever sent to any third
      # party. It's AVAILABLE by default, but nothing runs until a user turns
      # "Read aloud" on in the reader's display menu (per-browser). Uncomment the
      # line below to HARD-DISABLE it server-wide on a low-power host.
      # - TTS_ENABLED=false
      # Optional: cap concurrent synthesis on the host CPU (default 1).
      # - TTS_MAX_CONCURRENCY=1
      # Speed: startup logs report the active ONNX backend ("native onnxruntime-node"
      # = fast, all cores; a WASM warning = slow). If synthesis is slow despite the
      # native backend on an older CPU (no AVX-512/VNNI), rebuild with a different
      # model precision: docker build --build-arg TTS_MODEL_DTYPE=fp32 (or q4f16).

volumes:
  kernvault_data:
    name: kernvault_data
