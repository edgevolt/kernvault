services:
  kernvault:
    image: ghcr.io/edgevolt/kernvault:latest
    container_name: kernvault
    restart: unless-stopped
    ports:
      - "127.0.0.1:9876:9876"
    volumes:
      - kernvault_data:/app/data
    environment:
      - PORT=9876

volumes:
  kernvault_data:
    name: kernvault_data
